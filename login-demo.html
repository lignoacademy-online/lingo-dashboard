<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingo - Login</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lingo-blue': '#5170ff',
                        'lingo-pink': '#ff66c4',
                    },
                    fontFamily: {
                        'sans': ['Poppins', 'system-ui', 'sans-serif'],
                        'display': ['League Spartan', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'League Spartan', sans-serif;
        }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-5">
    
    <div class="w-full max-w-md">
        
        <!-- Lingo Avatar Waving -->
        <div class="text-center mb-8">
            <div class="w-32 h-32 mx-auto mb-6 relative">
                <!-- Avatar circle (white head) -->
                <div class="w-32 h-32 rounded-full bg-white border-4 border-gray-100 shadow-lg relative overflow-hidden">
                    <!-- Simple face -->
                    <div class="absolute top-12 left-8 w-4 h-4 bg-gray-800 rounded-full"></div>
                    <div class="absolute top-12 right-8 w-4 h-4 bg-gray-800 rounded-full"></div>
                    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 w-8 h-3 border-b-3 border-gray-800 rounded-full"></div>
                </div>
                <!-- Blue hoodie geometric shape -->
                <div class="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-24 h-16 bg-gradient-to-br from-[#5170ff] to-[#3d58cc] rounded-t-full"></div>
                <!-- Waving hand emoji -->
                <div class="absolute -top-4 -right-4 text-5xl animate-bounce">👋</div>
            </div>
            
            <h1 class="text-4xl font-bold mb-2">مرحبا بك!</h1>
            <p class="text-gray-600 text-lg">Welcome to Lingo</p>
        </div>
        
        <!-- Login Form -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            
            <!-- WhatsApp Login (Primary) -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    Phone Number
                </label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-medium">
                        +212
                    </span>
                    <input 
                        type="tel" 
                        placeholder="600 123 456"
                        class="w-full pl-16 pr-4 py-4 border-2 border-gray-200 rounded-xl focus:border-[#5170ff] focus:outline-none text-lg transition-colors"
                        maxlength="11"
                    />
                </div>
                <p class="text-xs text-gray-500 mt-2" dir="rtl">
                    سنرسل لك رمز التحقق عبر واتساب
                </p>
            </div>
            
            <!-- WhatsApp Login Button -->
            <button class="w-full bg-gradient-to-r from-[#25D366] to-[#1ebe57] text-white font-bold py-4 rounded-xl hover:shadow-lg transition-all duration-300 flex items-center justify-center gap-3 mb-4">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                </svg>
                Login with WhatsApp
            </button>
            
            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-500">Or continue with email</span>
                </div>
            </div>
            
            <!-- Email Login (Alternative) -->
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email
                    </label>
                    <input 
                        type="email" 
                        placeholder="you@example.com"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5170ff] focus:outline-none transition-colors"
                    />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <input 
                        type="password" 
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-[#5170ff] focus:outline-none transition-colors"
                    />
                </div>
                
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center">
                        <input type="checkbox" class="w-4 h-4 text-[#5170ff] border-gray-300 rounded focus:ring-[#5170ff]">
                        <span class="ml-2 text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-[#5170ff] font-medium hover:underline">
                        Forgot password?
                    </a>
                </div>
                
                <button class="w-full bg-[#5170ff] text-white font-bold py-3 rounded-xl hover:bg-[#3d58cc] transition-colors">
                    Login with Email
                </button>
            </div>
            
            <!-- Sign Up Link -->
            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Don't have an account? 
                    <a href="#" class="text-[#5170ff] font-semibold hover:underline">Sign up</a>
                </p>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">
                Need help? 
                <a href="#" class="text-[#ff66c4] font-medium hover:underline">Contact support</a>
            </p>
        </div>
        
    </div>
    
    <script>
        // Phone number formatting
        document.querySelector('input[type="tel"]').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\s/g, '');
            if (value.length > 3) {
                value = value.slice(0, 3) + ' ' + value.slice(3);
            }
            if (value.length > 7) {
                value = value.slice(0, 7) + ' ' + value.slice(7);
            }
            e.target.value = value;
        });
    </script>
    
</body>
</html>
